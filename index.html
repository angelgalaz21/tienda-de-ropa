<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda de Ropa</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --primary: #005fcc;
      --secondary: #f2f2f2;
      --focus: #ff9900;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:focus {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    header {
      background: var(--secondary);
      padding: 1rem;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .banner {
      position: relative;
      width: 100%;
      height: 250px;
      background: url('https://via.placeholder.com/1200x300?text=Moda+Actual') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
    }

    .banner h1 {
      background: rgba(0,0,0,0.6);
      padding: 1rem;
      border-radius: 8px;
    }

    main {
      padding: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .card-content {
      padding: 1rem;
      text-align: center;
    }

    footer {
      background: var(--secondary);
      padding: 1rem;
      text-align: center;
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      .banner {
        height: 180px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">ModaShop</div>
  </header>

  <section class="banner">
    <h1>Bienvenido a ModaShop</h1>
  </section>

  <main>
    <section class="grid">
      <a href="hombre.html" target="_blank" class="card">
        <img src="https://img.freepik.com/vector-premium/icono-bano-hombres-letrero-bano-caballeros_628407-2138.jpg" alt="Ropa Hombre" />
        <div class="card-content">
          <h2>Hombre</h2>
          <p>Ver colección</p>
        </div>
      </a>

      <a href="mujer.html" target="_blank" class="card">
        <img src="https://i.pinimg.com/236x/e0/d6/75/e0d6759077c4de702f766199b116fb1c.jpg" alt="Ropa Mujer" />
        <div class="card-content">
          <h2>Mujer</h2>
          <p>Ver colección</p>
        </div>
      </a>

      <a href="nino.html" target="_blank" class="card">
        <img src="https://doncartel.cl/wp-content/uploads/2024/12/ZONA-DE-NINOS-800X800PX.webp" alt="Ropa Niño" />
        <div class="card-content">
          <h2>Niño</h2>
          <p>Ver colección</p>
        </div>
      </a>
    </section>
  </main>

  <footer>
    <p><strong>Contacto:</strong></p>
    <p>Email: contacto@modashop.com</p>
    <p>Teléfono: +56 9 1234 5678</p>
    <p>Dirección: Santiago, Chile</p>
  </footer>

</body>
</html>
